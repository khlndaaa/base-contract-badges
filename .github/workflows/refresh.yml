name: Refresh Base Contract Badges

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: base-contract-badges
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate badges
        env:
          BLOCKSCOUT_API_KEY: ${{ secrets.BLOCKSCOUT_API_KEY }}
        run: python badge_generator.py

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || git commit -m "chore: refresh contract badges [skip ci]"
          git push
